<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"> 
<title>Light Teen</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#ff4da6,#6a5cff);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.participants {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: rgba(0,0,0,0.4);
  padding: 10px;
  border-radius: 15px;
  width: 160px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 8px;
  border: none;
  border-radius: 8px;
  background: #fff;
  color: black;
  cursor: pointer;
}

#resultado {
  display: none;
  margin-top: 20px;
}
</style>

</head>
<body>

<h1>✨ LIGHT TEEN ✨</h1>

<button onclick="abrirVideo()">🎬 Ver Abertura</button>
<div id="video"></div>

<h2>Participantes</h2>

<div class="participants">

<div class="card">
<img src="https://via.placeholder.com/150">
<p>Peu</p>
<button onclick="votar('Peu')">Votar</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<p>Saulo</p>
<button onclick="votar('Saulo')">Votar</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<p>Lukas</p>
<button onclick="votar('Lukas')">Votar</button>
</div>

</div>

<br>

<button onclick="verResultado()">🔒 Ver Resultado (Admin)</button>

<div id="resultado"></div>

<script>
let votos = {};

function votar(nome){
  if(!votos[nome]) votos[nome]=0;
  votos[nome]++;
  alert("Voto enviado!");
}

function verResultado(){
  let senha = prompt("Senha:");

  if(senha === "1234"){
    let ranking = Object.entries(votos)
      .sort((a,b)=>b[1]-a[1]);

    let texto = "<h2>Ranking</h2>";

    ranking.forEach((p,i)=>{
      texto += (i+1)+"º - "+p[0]+" ("+p[1]+" votos)<br>";
    });

    document.getElementById("resultado").innerHTML = texto;
    document.getElementById("resultado").style.display="block";
  } else {
    alert("Senha errada!");
  }
}

function abrirVideo(){
  document.getElementById("video").innerHTML =
  '<iframe width="300" height="200" src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>';
}
</script>

</body>
</html>
