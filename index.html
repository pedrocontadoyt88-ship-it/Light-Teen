<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Faeblood Family</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#000,#3b0000);
  color:white;
}

header {
  text-align:center;
  padding:20px;
  font-size:30px;
  background:black;
}

nav {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px;
}

nav button {
  padding:10px;
  border:none;
  background:crimson;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.section {
  display:none;
  padding:20px;
  text-align:center;
}

.active {
  display:block;
}

.cards {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.card {
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
  width:150px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.1);
}

img {
  width:100%;
  border-radius:10px;
}

input, button {
  margin:5px;
  padding:8px;
  border-radius:5px;
  border:none;
}

#adminPanel {
  display:none;
}
</style>

</head>
<body>

<header>🩸 FAEBLOOD FAMILY 🩸</header>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('membros')">Membros</button>
<button onclick="show('recrutar')">Recrutar</button>
<button onclick="show('ranking')">Ranking</button>
<button onclick="admin()">Admin</button>
</nav>

<div id="home" class="section active">
<h2>Bem-vindo à Faeblood</h2>
<p>A família mais temida do RP 🔥</p>
</div>

<div id="membros" class="section">
<h2>Membros</h2>
<div class="cards">

<div class="card">
<img src="https://via.placeholder.com/150">
<p>Peu 👑</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<p>Saulo ⚔️</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<p>Lukas 🩸</p>
</div>

</div>
</div>

<div id="recrutar" class="section">
<h2>Entrar na Faeblood</h2>
<input id="nome" placeholder="Seu nome">
<input id="idade" placeholder="Idade">
<br>
<button onclick="enviar()">Enviar</button>
<p id="msg"></p>
</div>

<div id="ranking" class="section">
<h2>Ranking</h2>
<div id="lista"></div>
</div>

<div id="adminPanel" class="section">
<h2>Painel Admin</h2>
<button onclick="addPonto('Peu')">+1 Peu</button>
<button onclick="addPonto('Saulo')">+1 Saulo</button>
<button onclick="addPonto('Lukas')">+1 Lukas</button>
</div>

<script>
let pontos = {
  "Peu":0,
  "Saulo":0,
  "Lukas":0
};

function show(sec){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(sec).classList.add('active');
}

function enviar(){
  let nome = document.getElementById('nome').value;
  document.getElementById('msg').innerText = "Pedido enviado 🔥";
}

function addPonto(nome){
  pontos[nome]++;
  atualizar();
}

function atualizar(){
  let ranking = Object.entries(pontos).sort((a,b)=>b[1]-a[1]);
  let texto="";
  ranking.forEach((p,i)=>{
    texto += (i+1)+"º "+p[0]+" - "+p[1]+" pts<br>";
  });
  document.getElementById("lista").innerHTML = texto;
}

function admin(){
  let senha = prompt("Senha:");

  if(senha==="faeblood"){
    show("adminPanel");
  } else {
    alert("Acesso negado");
  }
}
</script>

</body>
</html>
