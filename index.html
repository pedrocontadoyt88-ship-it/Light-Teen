<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Reality Show</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }
    h1 {
      color: #ff4da6;
    }
    .participants {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin: 20px;
    }
    .card {
      background: #222;
      padding: 10px;
      border-radius: 10px;
      width: 150px;
    }
    .card img {
      width: 100%;
      border-radius: 10px;
    }
    button {
      margin-top: 10px;
      padding: 8px;
      border: none;
      border-radius: 5px;
      background: #ff4da6;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #ff1a8c;
    }
    #video {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>🔥 Meu Reality Show 🔥</h1>

  <button onclick="mostrarAbertura()">Ver Abertura</button>

  <div id="video"></div>

  <h2>Participantes</h2>
  <div class="participants">
    <div class="card">
      <img src="https://via.placeholder.com/150" alt="Participante">
      <p>Nome 1</p>
      <button onclick="votar('Nome 1')">Votar</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/150" alt="Participante">
      <p>Nome 2</p>
      <button onclick="votar('Nome 2')">Votar</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/150" alt="Participante">
      <p>Nome 3</p>
      <button onclick="votar('Nome 3')">Votar</button>
    </div>
  </div>

  <h2>Resultado da Votação</h2>

<button onclick="verResultado()">Ver Resultado (Admin)</button>

<div id="resultado" style="display:none;">
  Nenhum voto ainda
</div>

  <script>
    let votos = {};

    function votar(nome) {
      if (!votos[nome]) votos[nome] = 0;
      votos[nome]++;
      atualizarResultado();
    }

    function atualizarResultado() {
      let texto = '';
      for (let nome in votos) {
        texto += nome + ': ' + votos[nome] + ' votos <br>';
      }
      document.getElementById('resultado').innerHTML = texto;
    }

    function mostrarAbertura() {
      document.getElementById('video').innerHTML = `
        <iframe width="560" height="315" 
        src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
        frameborder="0" allowfullscreen></iframe>
      `;
    }
  </script>

</body>
</html>
